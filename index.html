            color: white;

            -webkit-tap-highlight-color: transparent;
        }
        .bracket-container { scroll-snap-type: x mandatory; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        .bracket-col { scroll-snap-align: start; }
        .score-input { width: 45px; text-align: center; background: #1e293b; border: 1px solid #475569; color: white; border-radius: 6px; padding: 6px; font-weight: bold; font-size: 16px; }

        .score-input:disabled { opacity: 0.5; cursor: not-allowed; background: #0f172a; }
        .team-btn { transition: all 0.2s ease-in-out; min-height: 44px; }
        .team-btn:active { transform: scale(0.98); }
        .team-btn.selected { background-color: #2563eb; color: white; border-color: #3b82f6; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.3); }
        .team-btn.correct { background-color: #16a34a !important; color: white; border-color: #15803d; box-shadow: 0 4px 6px -1px rgba(22, 163, 74, 0.3); }
        .team-btn.incorrect { background-color: #dc2626 !important; color: white; border-color: #b91c1c; opacity: 0.75; }
        .team-btn:disabled { cursor: not-allowed; }
        
        .golden-crown {
            background: linear-gradient(135deg, #ca8a04 0%, #a16207 100%) !important;
            color: white !important;
            border-color: #facc15 !important;
            box-shadow: 0 0 20px rgba(250, 204, 21, 0.5) !important;
            transform: scale(1.02);
            font-weight: 900;
            z-index: 10;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

            lines.forEach(line => {

            const enforceHardcodedScores = (scores = {}) => ({ ...scores, ...hardcodedJune12Scores });
            const enforceLeaguesHardcodedScores = (leagueList = []) => (
                leagueList.map(league => ({

                    users: (league.users || []).map(user => {
                        const gs = user.gameState || initGameState();
                        return {

                            gameState: {

                                scores: enforceHardcodedScores(gs.scores || {})
                            }
                        };

                }))
            );
            const enforceAdminHardcodedScores = (admin) => ({

            const [adminData, setAdminData] = useState({ ...initGameState(), phase1Locked: false, phase2Locked: false });
            const [gameState, setGameState] = useState(initGameState());

            const [newLeagueName, setNewLeagueName] = useState('');
            const [newLeaguePin, setNewLeaguePin] = useState('');
            const [newUserName, setNewUserName] = useState('');
            const [editingUserId, setEditingUserId] = useState(null);

            const [isAILoading, setIsAILoading] = useState(false);
            const [syncStatus, setSyncStatus] = useState('Connecting...');
            
            const isFirstRender = useRef(true);
            const fileInputRef = useRef(null);

            // --- CLOUD SYNC ---
            useEffect(() => {
                const fetchFromCloud = async () => {
                    // Bug 1 fix: check for ?data= share-link parameter first
                    const urlParams = new URLSearchParams(window.location.search);
                    const sharedData = urlParams.get('data');
                    if (sharedData) {
                        try {

                            const payload = JSON.parse(decompressed);

                        return;

                        const storedAdmin = localStorage.getItem('wc2026_admin_v26');
                        if (storedAdmin) setAdminData(enforceAdminHardcodedScores(JSON.parse(storedAdmin)));
                        return;
                    }
                    setSyncStatus('☁️ Loading...');
                    try {
                        const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, { headers: { 'X-Master-Key': JSONBIN_API_KEY } });
                        const data = await response.json();

                };
                fetchFromCloud();

            useEffect(() => {

                localStorage.setItem('wc2026_admin_v26', JSON.stringify(adminData));
                if (JSONBIN_BIN_ID === "FAKE_BIN_ID_12345") return;

                const saveToCloud = async () => {
                    setSyncStatus('☁️ Saving...');
                    try {
                        await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                            method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY },
                            body: JSON.stringify({ leagues, adminData })

                        setSyncStatus('☁️ Synced');
                    } catch (error) { setSyncStatus('⚠️ Save Failed'); }
                };
                const timeoutId = setTimeout(saveToCloud, 1500);
                return () => clearTimeout(timeoutId);
            }, [leagues, adminData]);

            // --- AUTO-CALCULATE STANDINGS ---
            const calculateGroupStandings = (groupName, currentScores) => {
                const teams = groupsData[groupName].map(t => ({ name: t, pts: 0, gd: 0, gf: 0, ga: 0, played: 0 }));
                groupMatches[groupName].forEach(m => {
                    const s = currentScores?.[m.id];
                    if (s && s.h !== '' && s.a !== '') {
                        const t1 = teams.find(t => t.name === m.t1);
                        const t2 = teams.find(t => t.name === m.t2);
                        const h = parseInt(s.h); const a = parseInt(s.a);
                        t1.played++; t2.played++;
                        t1.gf += h; t1.ga += a; t1.gd += (h - a);
                        t2.gf += a; t2.ga += h; t2.gd += (a - h);
                        if (h > a) t1.pts += 3; else if (a > h) t2.pts += 3; else { t1.pts += 1; t2.pts += 1; }
                    }
                });
                return teams.sort((a, b) => {
                    if (b.pts !== a.pts) return b.pts - a.pts;
                    if (b.gd !== a.gd) return b.gd - a.gd;
                    if (b.gf !== a.gf) return b.gf - a.gf;
                    return a.name.localeCompare(b.name); 
                });
            };

            const allStandings = useMemo(() => {
                const st = {}; Object.keys(groupsData).forEach(g => { st[g] = calculateGroupStandings(g, gameState?.scores || {}); }); return st;
            }, [gameState.scores]);

            const adminStandings = useMemo(() => {
                const st = {}; Object.keys(groupsData).forEach(g => { st[g] = calculateGroupStandings(g, adminData?.scores || {}); }); return st;
            }, [adminData.scores]);

            // --- GAME LOGIC ---
            const saveState = (updates) => {
                if (isEditingOfficialResults) { 
                    const safeUpdates = updates.scores
                        ? { ...updates, scores: enforceHardcodedScores(updates.scores) }
                        : updates;
                    setAdminData(prev => ({ ...prev, ...safeUpdates })); 
                    setGameState(prev => ({ ...prev, ...safeUpdates })); // FIX: Update UI for Admin
                    return; 
                }
                if (!currentLeague || !currentUser) return;
                const updatedState = { ...gameState, ...updates };
                setGameState(updatedState);
                const updatedUser = { ...currentUser, gameState: updatedState };
                const updatedUsers = currentLeague.users.map(u => u.id === currentUser.id ? updatedUser : u);
                const updatedLeague = { ...currentLeague, users: updatedUsers };
                setLeagues(leagues.map(l => l.id === currentLeague.id ? updatedLeague : l)); 
                setCurrentLeague(updatedLeague); setCurrentUser(updatedUser);
            };

            const handleScoreChange = (matchId, type, value) => {
                if (gameState.isLocked && !isEditingOfficialResults) return;
                const scoresSource = isEditingOfficialResults ? adminData.scores : gameState.scores;
                const bracketSource = isEditingOfficialResults ? adminData.bracket : gameState.bracket;
                
                if (!isEditingOfficialResults) {
                    if (matchId.startsWith('G_') && adminData.phase1Locked) return alert("Group Stage is locked by Admin!");
                    if (!matchId.startsWith('G_') && adminData.phase2Locked) return alert("Knockout Stage is locked by Admin!");
                }
                
                if (!isEditingOfficialResults && (matchId === 'G_A_1' || matchId === 'G_A_2')) return;

                let val;
                if (type === 'p') {
                    val = value;
                } else {
                    val = value === '' ? '' : parseInt(value);
                    if (val < 0 || val > 20) return;
                }

                const newScores = { ...scoresSource, [matchId]: { ...scoresSource[matchId], [type]: val } };
                
                if (matchId.startsWith('r') || matchId.startsWith('q') || matchId.startsWith('s') || matchId.startsWith('f') || matchId.startsWith('t')) {
                    const s = newScores[matchId];
                    if (s.h !== '' && s.a !== '' && s.h !== s.a) s.p = null;
                }

                if (matchId.startsWith('G_')) {
                    // In admin mode with phase1 already locked, preserve the existing bracket
                    const shouldClearBracket = !(isEditingOfficialResults && adminData.phase1Locked);
                    if (!shouldClearBracket) {
                        saveState({ scores: newScores });
                    } else {
                        saveState({ scores: newScores, selectedThirds: [], bracket: { r32: [], r16: [], qf: [], sf: [], final: [], thirdPlace: [] } });
                    }
                } else {
                    const newBracket = JSON.parse(JSON.stringify(bracketSource));
                    let found = false;
                    const updateWinner = (roundKey) => {
                        if (found) return;
                        const mIndex = newBracket[roundKey].findIndex(m => m.id === matchId);
                        if (mIndex > -1) {
                            found = true;
                            const m = newBracket[roundKey][mIndex];
                            const s = newScores[matchId];
                            let winner = null;
                            if (s.h !== '' && s.a !== '') {
                                if (s.h > s.a) winner = m.t1;
                                else if (s.a > s.h) winner = m.t2;
                                else if (s.p === 1) winner = m.t1;
                                else if (s.p === 2) winner = m.t2;
                            }
                            m.winner = winner;
                            
                            const advanceMap = { r32: 'r16', r16: 'qf', qf: 'sf', sf: 'final', final: null, thirdPlace: null };
                            const nextRound = advanceMap[roundKey];

                            if (roundKey === 'sf') {
                                const sfMatches = newBracket.sf;
                                newBracket.final = [{ id: 'final_0', t1: sfMatches[0].winner, t2: sfMatches[1] ? sfMatches[1].winner : null, winner: null }];
                                const getLoser = (match) => { if (!match.winner) return null; return match.winner === match.t1 ? match.t2 : match.t1; };
                                newBracket.thirdPlace = [{ id: 'thirdPlace_0', t1: getLoser(sfMatches[0]), t2: sfMatches[1] ? getLoser(sfMatches[1]) : null, winner: null }];
                            } else if (nextRound) {
                                const currentMatches = newBracket[roundKey];
                                const nextMatches = [];
                                for (let i = 0; i < currentMatches.length; i += 2) {
                                    nextMatches.push({ id: `${nextRound}_${i/2}`, t1: currentMatches[i].winner, t2: currentMatches[i+1] ? currentMatches[i+1].winner : null, winner: null });
                                }
                                newBracket[nextRound] = nextMatches;
                                let clearRound = advanceMap[nextRound];
                                while(clearRound) { 
                                    newBracket[clearRound] = []; 
                                    if (clearRound === 'final') newBracket['thirdPlace'] = [];
                                    clearRound = advanceMap[clearRound]; 
                                }
                            }
                        }
                    };
                    ['r32', 'r16', 'qf', 'sf', 'final', 'thirdPlace'].forEach(updateWinner);
                    saveState({ scores: newScores, bracket: newBracket });
                }
            };

                const scoresToCheck = isEditingOfficialResults ? adminData.scores : gameState.scores;
                let complete = true;
                Object.keys(groupMatches).forEach(g => {
                    groupMatches[g].forEach(m => {
                        const s = scoresToCheck?.[m.id];
                        if (!s || s.h == null || s.a == null || s.h === '' || s.a === '') complete = false;
                    });
                });
                return complete;
            };

            const getTop8Thirds = (standings) => {
                const thirds = Object.keys(groupsData).map(g => ({ group: g, ...standings[g][2] }));
                thirds.sort((a, b) => {
                    if (b.pts !== a.pts) return b.pts - a.pts;
                    if (b.gd !== a.gd) return b.gd - a.gd;
                    if (b.gf !== a.gf) return b.gf - a.gf;
                    return a.name.localeCompare(b.name);
                });
                return thirds.slice(0, 8).map(t => t.name);
            };

            const generateBracket = () => {
                if (!isEditingOfficialResults && adminData.phase1Locked && adminData.bracket?.r32?.length > 0) {
                    const r32 = adminData.bracket.r32.map(m => ({ id: m.id, label: m.label, t1: m.t1, t2: m.t2, winner: null }));
                    saveState({ selectedThirds: adminData.selectedThirds || [], bracket: { r32, r16: [], qf: [], sf: [], final: [], thirdPlace: [] }, progress: 'bracket' });

                if (gameState.isLocked && !isEditingOfficialResults) { setView('bracket'); return; }

                const standingsToUse = isEditingOfficialResults ? adminStandings : allStandings;
                const top8Thirds = getTop8Thirds(standingsToUse);
                
                const firsts = {}; const seconds = {};
                Object.keys(groupsData).forEach(g => {
                    firsts[g] = standingsToUse[g][0].name;

                const thirdsGroups = top8Thirds.map(t => Object.keys(groupsData).find(g => standingsToUse[g][2].name === t));
                const comboKey = [...thirdsGroups].sort().join('');
                const assignedGroups = fifaMatrix[comboKey];
                
                if (!assignedGroups) return alert("⚠️ Critical Error: Invalid FIFA combination generated.");

                const tMap = {};
                const slots = ['A', 'B', 'D', 'E', 'G', 'I', 'K', 'L'];
                slots.forEach((g, i) => { tMap[g] = top8Thirds.find(t => standingsToUse[assignedGroups[g]][2].name === t); });

                const r32 = [
                    { id: 'r32_74', label: 'M74', t1: firsts['E'],  t2: tMap['E'],    winner: null },
                    { id: 'r32_77', label: 'M77', t1: firsts['I'],  t2: tMap['I'],    winner: null },
                    { id: 'r32_73', label: 'M73', t1: seconds['A'], t2: seconds['B'], winner: null },
                    { id: 'r32_75', label: 'M75', t1: firsts['F'],  t2: seconds['C'], winner: null },
                    { id: 'r32_83', label: 'M83', t1: seconds['K'], t2: seconds['L'], winner: null },
                    { id: 'r32_84', label: 'M84', t1: firsts['H'],  t2: seconds['J'], winner: null },
                    { id: 'r32_81', label: 'M81', t1: firsts['D'],  t2: tMap['D'],    winner: null },
                    { id: 'r32_82', label: 'M82', t1: firsts['G'],  t2: tMap['G'],    winner: null },
                    { id: 'r32_76', label: 'M76', t1: firsts['C'],  t2: seconds['F'], winner: null },
                    { id: 'r32_78', label: 'M78', t1: seconds['E'], t2: seconds['I'], winner: null },
                    { id: 'r32_79', label: 'M79', t1: firsts['A'],  t2: tMap['A'],    winner: null },
                    { id: 'r32_80', label: 'M80', t1: firsts['L'],  t2: tMap['L'],    winner: null },
                    { id: 'r32_86', label: 'M86', t1: firsts['J'],  t2: seconds['H'], winner: null },
                    { id: 'r32_88', label: 'M88', t1: seconds['D'], t2: seconds['G'], winner: null },
                    { id: 'r32_85', label: 'M85', t1: firsts['B'],  t2: tMap['B'],    winner: null },
                    { id: 'r32_87', label: 'M87', t1: firsts['K'],  t2: tMap['K'],    winner: null },
                ];

                saveState({ selectedThirds: top8Thirds, bracket: { r32, r16: [], qf: [], sf: [], final: [], thirdPlace: [] }, progress: 'bracket' }); 
                setView('bracket');
            };

            // --- AUTO-FILL (PATCHED) ---
            const executeAutoFill = (mode) => {
                if (gameState.isLocked && !isEditingOfficialResults) return;
                
                const activeScores = isEditingOfficialResults ? adminData.scores : gameState.scores;
                const activeBracket = isEditingOfficialResults ? adminData.bracket : gameState.bracket;
                const activeThirds = isEditingOfficialResults ? adminData.selectedThirds : gameState.selectedThirds;
                const newScores = { ...activeScores };
                
                if (mode === 'groups') {
                    if (!isEditingOfficialResults && adminData.phase1Locked) {
                        return alert("Group Stage is locked by Admin. You cannot change group scores.");
                    }
                    Object.keys(groupMatches).forEach(g => {
                        groupMatches[g].forEach(m => {
                            if (m.id !== 'G_A_1' && m.id !== 'G_A_2') {
                                newScores[m.id] = { h: Math.floor(Math.random() * 4), a: Math.floor(Math.random() * 4) };
                            }
                        });
                    });
                }

                if (mode === 'bracket') {
                    if (!isEditingOfficialResults && adminData.phase2Locked) {
                        return alert("Knockout Stage is locked by Admin.");
                    }
                    if (mode === 'bracket' && !allGroupsComplete()) return alert("Complete groups first!");
                    const currentBracket = JSON.parse(JSON.stringify(activeBracket));
                    const r32 = currentBracket.r32 || [];
                    if (!r32.length) return alert("Generate bracket first!");

                    const simulateRound = (matches) => {
                        matches.forEach(m => {
                            const h = Math.floor(Math.random() * 4);
                            const a = Math.floor(Math.random() * 4);
                            let p = null;
                            if (h === a) p = Math.random() > 0.5 ? 1 : 2;
                            newScores[m.id] = { h, a, p };
                            m.winner = h > a ? m.t1 : (a > h ? m.t2 : (p === 1 ? m.t1 : m.t2));
                        });
                    };

                    simulateRound(r32);
                    const buildNextRound = (prevRound, roundKey) => {
                        const nextMatches = [];
                        for (let i = 0; i < prevRound.length; i += 2) { nextMatches.push({ id: `${roundKey}_${i/2}`, t1: prevRound[i].winner, t2: prevRound[i+1].winner, winner: null }); }
                        return nextMatches;
                    };
                    const r16 = buildNextRound(r32, 'r16'); simulateRound(r16);
                    const qf = buildNextRound(r16, 'qf'); simulateRound(qf);
                    const sf = buildNextRound(qf, 'sf'); simulateRound(sf);
                    
                    const final = buildNextRound(sf, 'final'); simulateRound(final);
                    const thirdPlace = [{ id: 'thirdPlace_0', t1: sf[0].winner === sf[0].t1 ? sf[0].t2 : sf[0].t1, t2: sf[1].winner === sf[1].t1 ? sf[1].t2 : sf[1].t1, winner: null }];
                    simulateRound(thirdPlace);

                    saveState({ scores: newScores, selectedThirds: activeThirds || [], bracket: { r32, r16, qf, sf, final, thirdPlace }, progress: 'bracket' });
                    setView('bracket');
                } else {

                        if (uH === aH && uA === aA) { matchPts += 5; breakdown.matchScores += 5; }
                        else if ((uH - uA) === (aH - aA)) { matchPts += 3; breakdown.matchScores += 3; }
                        else if (Math.sign(uH - uA) === Math.sign(aH - aA) && (uH !== uA)) { matchPts += 2; breakdown.matchScores += 2; }
                        
                        if (uS.p && aS.p && uS.p === aS.p) { matchPts += 2; breakdown.matchScores += 2; }

                    userState?.bracket?.[roundKey]?.forEach(m => {

                                    <div className="text-4xl font-black flex justify-center items-center gap-6 mb-8"><span>{getFlag('Brazil')}</span> <span className="text-slate-500 text-xl">vs</span> <span>{getFlag('France')}</span></div>
                                    <div className="text-3xl font-black text-white">Predicted Champion: <span className="text-yellow-400 block mt-2 text-5xl">👑 {getFlag('Brazil')}</span></div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            if (view === 'rules') {
                return (
                    <div className="max-w-4xl mx-auto mt-4 sm:mt-10 p-4 sm:p-8 bg-slate-800 rounded-xl border border-slate-700 shadow-2xl">
                        <div className="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
                            <button onClick={() => setView('leagues')} className="px-4 py-2 bg-slate-600 rounded hover:bg-slate-500 font-bold transition">⬅ Back</button>
                            <h1 className="text-2xl sm:text-3xl font-bold text-blue-400">📖 Rules & Scoring (V2.0)</h1>
                            <div className="w-16 sm:w-24"></div>
                        </div>
                        <div className="space-y-8 text-slate-300 leading-relaxed text-left">
                            <section>
                                <h2 className="text-xl sm:text-2xl font-bold text-white mb-3 border-l-4 border-blue-500 pl-3">🎮 How to Play</h2>
                                <ol className="list-decimal list-inside space-y-3 ml-2">
                                    <li><strong>Predict Scores:</strong> You must predict the exact score of all 72 Group Stage matches. The app will automatically calculate the group standings for you!</li>
                                    <li><strong>Auto-Bracket:</strong> Once groups are done, click Generate Bracket. The app automatically finds the best 8 third-place teams and builds your FIFA bracket.</li>
                                    <li><strong>Knockout Scores:</strong> Predict the scores for the knockout bracket. If you predict a draw, you must select who wins on penalties.</li>
                                    <li><strong>Lock & Submit:</strong> Once you hit 100%, click Lock. You cannot change picks after locking!</li>
                                </ol>
                            </section>
                            <section>
                                <h2 className="text-xl sm:text-2xl font-bold text-white mb-3 border-l-4 border-green-500 pl-3">💯 Scoring System</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6">
                                    <div className="bg-slate-700/50 p-5 rounded-lg border border-slate-600">
                                        <h3 className="text-lg font-bold text-blue-400 mb-2">Match Score Points</h3>
                                        <ul className="space-y-2">
                                            <li><span className="font-bold text-white bg-slate-800 px-2 py-1 rounded">+5 Points</span> Exact Score (e.g. you picked 2-1, actual 2-1)</li>
                                            <li><span className="font-bold text-white bg-slate-800 px-2 py-1 rounded">+3 Points</span> Correct Goal Difference or Draw (e.g. you picked 2-0, actual 3-1)</li>
                                            <li><span className="font-bold text-white bg-slate-800 px-2 py-1 rounded">+2 Points</span> Correct Winner (e.g. you picked 1-0, actual 3-0)</li>
                                            <li><span className="font-bold text-white bg-slate-800 px-2 py-1 rounded">+2 Bonus</span> Correct Penalty Shootout Winner</li>
                                        </ul>
                                    </div>
                                    <div className="bg-slate-700/50 p-5 rounded-lg border border-slate-600">
                                        <h3 className="text-lg font-bold text-green-400 mb-2">Bracket Points</h3>
                                        <ul className="space-y-2">
                                            <li><span className="font-bold text-white bg-slate-800 px-2 py-1 rounded">+2 Points</span> per team in exact correct Group position</li>
                                            <li><span className="font-bold text-white bg-slate-800 px-2 py-1 rounded">+4 Points</span> per correct 3rd Place advancing team</li>
                                            <li><span className="font-bold text-white bg-slate-800 px-2 py-1 rounded">+1 to +16 Pts</span> for correctly predicting teams to advance in the Knockout Stage</li>
                                        </ul>
                                    </div>
                                </div>
                            </section>
                        </div>
                    </div>
                );
            }

            if (view === 'leagues') {
                return (
                    <div className="max-w-3xl mx-auto mt-4 sm:mt-20 p-6 bg-slate-800 rounded-xl border border-slate-700 text-center shadow-2xl">
                        <div className="flex justify-center mb-4"><span className={`text-xs font-bold px-3 py-1 rounded-full border ${syncStatus.includes('Error') || syncStatus.includes('Failed') || syncStatus.includes('Offline') ? 'bg-red-900/50 text-red-400 border-red-700' : 'bg-blue-900/50 text-blue-400 border-blue-700'}`}>{syncStatus}</span></div>
                        <div className="flex justify-between mb-4">
                            <button onClick={handleAIPrediction} className="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-500 font-bold text-sm shadow transition flex items-center gap-2">🤖 AI Prediction</button>
                            <button onClick={() => setView('rules')} className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-500 font-bold text-sm shadow transition">📖 Rules & Scoring</button>
                        </div>
                        <h1 className="text-3xl sm:text-5xl font-extrabold mb-2 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-green-400">World Cup 2026</h1>
                        <h2 className="text-lg sm:text-xl text-slate-400 mb-8">V2.0 Auto-Calculating Engine</h2>
                        
                        {isAdminLoggedIn && (
                            <div className="mb-8 bg-slate-900/50 p-6 rounded-xl border border-slate-600">
                                <h3 className="text-lg font-bold text-purple-400 mb-4">👑 Admin: Create a New League</h3>
                                <div className="flex flex-col sm:flex-row justify-center items-center gap-3">
                                    <input type="text" value={newLeagueName} onChange={e => setNewLeagueName(e.target.value)} placeholder="League Name" className="w-full sm:w-auto px-4 py-3 rounded-lg bg-slate-800 text-white border border-slate-600 focus:outline-none" />
                                    <input type="text" value={newLeaguePin} onChange={e => setNewLeaguePin(e.target.value)} placeholder="Set 4-Digit PIN" className="w-full sm:w-32 px-4 py-3 rounded-lg bg-slate-800 text-white border border-slate-600 focus:outline-none" />
                                    <button onClick={addLeague} className="w-full sm:w-auto px-6 py-3 bg-green-600 rounded-lg font-bold hover:bg-green-500 transition shadow-lg">Create</button>
                                </div>
                            </div>
                        )}
                        
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-10">
                            {leagues.map(l => (
                                <div key={l.id} className="relative flex rounded-xl overflow-hidden border border-slate-600 shadow-lg">
                                    <button onClick={() => handleSelectLeague(l)} className="flex-1 p-6 bg-gradient-to-br from-slate-700 to-slate-800 hover:from-blue-600 hover:to-blue-700 transition font-bold text-xl flex justify-between items-center group">
                                        <span className="group-hover:text-white">{l.name}</span>
                                        <span className="text-sm bg-slate-900/50 px-3 py-1 rounded-full text-slate-300 group-hover:text-white">{l?.users?.length || 0} Players</span>
                                    </button>
                                    {isAdminLoggedIn && <button onClick={() => { if (confirm(`Delete league "${l.name}"? This cannot be undone.`)) setLeagues(leagues.filter(x => x.id !== l.id)); }} className="px-3 bg-red-900/50 hover:bg-red-800 transition border-l border-slate-600 text-red-400 font-bold text-lg" title="Delete League">✕</button>}
                                </div>
                            ))}
                        </div>

                        <div className="pt-8 border-t border-slate-700">
                            {!isAdminLoggedIn ? (
                                <button onClick={handleAdminLogin} className="w-full sm:w-auto px-8 py-4 bg-slate-700 rounded-xl font-bold hover:bg-slate-600 text-lg shadow-lg transition border border-slate-600">👑 Admin Login</button>
                            ) : (
                                <div className="flex flex-col gap-4 justify-center items-center">
                                    <div className="flex gap-4">
                                        <button onClick={enterOfficialResultsMode} className="w-full sm:w-auto px-8 py-4 bg-gradient-to-r from-purple-600 to-purple-800 rounded-xl font-bold hover:from-purple-500 hover:to-purple-700 text-lg shadow-lg transition border border-purple-500/50">⚙️ Set Official Tournament Results</button>
                                        <button onClick={() => setIsAdminLoggedIn(false)} className="w-full sm:w-auto px-8 py-4 bg-slate-700 rounded-xl font-bold hover:bg-slate-600 text-lg shadow-lg transition border border-slate-600">Logout Admin</button>
                                    </div>
                                    <div className="bg-slate-900 p-4 rounded-lg border border-slate-700 flex gap-6 mt-4">
                                        <label className="flex items-center gap-2 text-red-400 font-bold cursor-pointer">
                                            <input type="checkbox" checked={adminData.phase1Locked} onChange={(e) => setAdminData({...adminData, phase1Locked: e.target.checked})} className="w-5 h-5" />
                                            Lock Phase 1 (Groups)
                                        </label>
                                        <label className="flex items-center gap-2 text-red-400 font-bold cursor-pointer">
                                            <input type="checkbox" checked={adminData.phase2Locked} onChange={(e) => setAdminData({...adminData, phase2Locked: e.target.checked})} className="w-5 h-5" />
                                            Lock Phase 2 (Knockouts)
                                        </label>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            if (view === 'users') {
                return (
                    <div className="max-w-4xl mx-auto mt-4 sm:mt-10 p-4 sm:p-8 bg-slate-800 rounded-xl border border-slate-700 text-center shadow-2xl">
                        <div className="flex justify-center mb-4"><span className={`text-xs font-bold px-3 py-1 rounded-full border ${syncStatus.includes('Error') || syncStatus.includes('Failed') || syncStatus.includes('Offline') ? 'bg-red-900/50 text-red-400 border-red-700' : 'bg-blue-900/50 text-blue-400 border-blue-700'}`}>{syncStatus}</span></div>
                        <div className="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4 border-b border-slate-700 pb-6">
                            <button onClick={() => setView('leagues')} className="w-full sm:w-auto px-4 py-2 bg-slate-700 rounded-lg hover:bg-slate-600 text-sm font-bold transition">⬅ Back to Leagues</button>
                            <h1 className="text-2xl sm:text-4xl font-bold text-blue-400 truncate px-4">{currentLeague.name}</h1>
                            <div className="flex gap-2 w-full sm:w-auto">
                                {isAdminLoggedIn && <button onClick={generateShareLink} className="flex-1 sm:flex-none px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-500 font-bold text-sm shadow-lg transition">🔗 Copy Live Link</button>}
                                <button onClick={() => setView('leaderboard')} className="flex-1 sm:flex-none px-4 py-2 bg-gradient-to-r from-yellow-600 to-yellow-500 text-yellow-50 rounded-lg hover:from-yellow-500 hover:to-yellow-400 font-bold text-sm shadow-lg transition">🏆 Leaderboard</button>
                            </div>
                        </div>
                        
                        <div className="mb-10 bg-slate-900/50 p-4 sm:p-6 rounded-xl border border-slate-700">
                            <h2 className="text-lg text-slate-300 mb-4 font-semibold">Add a New Player</h2>
                            <div className="flex flex-col sm:flex-row justify-center items-center gap-3">
                                <input type="text" value={newUserName} onChange={e => setNewUserName(e.target.value)} placeholder="Enter Player Name" className="w-full sm:w-64 px-4 py-3 rounded-lg bg-slate-800 text-white border border-slate-600 focus:outline-none" />
                                <button onClick={addUser} className="w-full sm:w-auto px-6 py-3 bg-green-600 rounded-lg font-bold hover:bg-green-500 transition shadow">Add Player</button>
                                {isAdminLoggedIn && (
                                    <>
                                        <span className="text-slate-600 hidden sm:inline mx-2">|</span>
                                        <input type="file" accept=".json" ref={fileInputRef} onChange={handleImport} className="hidden" />
                                        <button onClick={() => fileInputRef.current.click()} className="w-full sm:w-auto px-6 py-3 bg-slate-700 rounded-lg font-bold hover:bg-slate-600 transition flex items-center justify-center gap-2 border border-slate-600">📤 Import .json</button>
                                    </>
                                )}
                            </div>
                        </div>
                        
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                            {(currentLeague.users || []).map(u => {
                                const score = calculateScore(u.gameState).total;
                                return (
                                    <div key={u.id} className="flex bg-slate-700 rounded-xl overflow-hidden border border-slate-600 shadow hover:border-blue-500 transition group relative">
                                        <button onClick={() => selectUser(u)} className="flex-1 p-4 hover:bg-blue-600 transition font-bold text-lg text-left flex justify-between items-center">
                                            <span className="truncate mr-2 flex items-center gap-2">{u.gameState.isLocked && <span title="Locked">🔒</span>} {u.name}</span>
                                            <span className="text-xs bg-slate-900 px-2 py-1 rounded-full text-yellow-400 whitespace-nowrap border border-slate-600">{score} pts</span>
                                        </button>
                                        {isAdminLoggedIn && u.gameState.isLocked && <button onClick={() => adminUnlockUser(u.id)} className="px-3 bg-red-900/50 hover:bg-red-800 transition border-l border-slate-600 text-red-300" title="Admin Unlock">🔓</button>}
                                       {isAdminLoggedIn && <button onClick={() => { if (confirm(`Remove "${u.name}" from this league?`)) { const updatedUsers = currentLeague.users.filter(x => x.id !== u.id); const updatedLeague = { ...currentLeague, users: updatedUsers }; setLeagues(leagues.map(l => l.id === currentLeague.id ? updatedLeague : l)); setCurrentLeague(updatedLeague); } }} className="px-3 bg-red-900/50 hover:bg-red-800 transition border-l border-slate-600 text-red-400 font-bold" title="Delete Player">✕</button>}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            }

            if (view === 'leaderboard') {
                const rankedUsers = [...(currentLeague.users || [])].map(u => ({ ...u, scoreObj: calculateScore(u.gameState) })).sort((a, b) => b.scoreObj.total - a.scoreObj.total);
                return (
                    <div className="max-w-5xl mx-auto mt-4 sm:mt-10 p-4 sm:p-8 bg-slate-800 rounded-xl border border-slate-700 shadow-2xl">
                        <div className="flex justify-center mb-4"><span className={`text-xs font-bold px-3 py-1 rounded-full border ${syncStatus.includes('Error') || syncStatus.includes('Failed') || syncStatus.includes('Offline') ? 'bg-red-900/50 text-red-400 border-red-700' : 'bg-blue-900/50 text-blue-400 border-blue-700'}`}>{syncStatus}</span></div>
                        <div className="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4 border-b border-slate-700 pb-6">
                            <button onClick={() => setView('users')} className="w-full sm:w-auto px-4 py-2 bg-slate-700 rounded-lg hover:bg-slate-600 font-bold transition">⬅ Back to Players</button>
                            <h1 className="text-2xl sm:text-3xl font-bold text-yellow-400 flex items-center gap-2">🏆 {currentLeague.name} Leaderboard</h1>
                            <div className="w-full sm:w-24"></div>
                        </div>
                        <div className="overflow-x-auto rounded-lg border border-slate-700">
                            <table className="w-full text-left border-collapse whitespace-nowrap">
                                <thead>
                                    <tr className="bg-slate-900 text-slate-300 text-sm uppercase tracking-wider">
                                        <th className="p-4 border-b border-slate-700 font-semibold">Rank</th>
                                        <th className="p-4 border-b border-slate-700 font-semibold">Player</th>
                                        <th className="p-4 border-b border-slate-700 text-center font-semibold text-blue-300">Match Pts</th>
                                        <th className="p-4 border-b border-slate-700 text-center font-semibold text-green-300">Bracket Pts</th>
                                        <th className="p-4 border-b border-slate-700 text-right text-yellow-400 font-bold">Total Score</th>
                                    </tr>
                                </thead>
                                <tbody className="bg-slate-800">
                                    {rankedUsers.map((u, index) => (
                                        <tr key={u.id} className="hover:bg-slate-700/50 transition border-b border-slate-700/50 last:border-0">
                                            <td className="p-4 font-bold text-lg text-slate-400">{index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `#${index + 1}`}</td>
                                            <td className="p-4 font-bold text-white flex items-center gap-2">{u.gameState.isLocked && <span className="text-xs" title="Locked">🔒</span>} {u.name}</td>
                                            <td className="p-4 text-center text-blue-300 font-bold">{u.scoreObj.matchPts}</td>
                                            <td className="p-4 text-center text-green-300 font-bold">{u.scoreObj.bracketPts}</td>
                                            <td className="p-4 text-right font-black text-yellow-400 text-xl">{u.scoreObj.total}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                );
            }

            const progressPercent = getProgress();
            const isLocked = gameState.isLocked;
            const currentStandings = isEditingOfficialResults ? adminStandings : allStandings;
            const isOfficialBracketPublished = adminData.phase1Locked && adminData.bracket?.r32?.length > 0;
            const showKnockoutTab = isEditingOfficialResults || isOfficialBracketPublished;
            const canAutoFillCurrentStage = !isLocked && (
                (view === 'groups' && !adminData.phase1Locked) ||
                (view === 'bracket' && !adminData.phase2Locked)
            );
            const userR32TeamsKey = gameState.bracket?.r32?.map(m => `${m.t1}|${m.t2}`).join(',') || '';
            const adminR32TeamsKey = adminData.bracket?.r32?.map(m => `${m.t1}|${m.t2}`).join(',') || '';

            useEffect(() => {
                if (!isEditingOfficialResults && isOfficialBracketPublished && view === 'bracket' && userR32TeamsKey !== adminR32TeamsKey) {
                    generateBracket();
                }
            }, [view, isEditingOfficialResults, isOfficialBracketPublished, userR32TeamsKey, adminR32TeamsKey, generateBracket]);

            return (
                <div className="min-h-screen pb-20 relative">
                    {/* STICKY HEADER */}
                    <div className="sticky top-0 z-40 bg-slate-900/95 backdrop-blur-md border-b border-slate-700 shadow-lg pt-4 pb-4 px-4 sm:px-8 mb-6">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex items-center gap-3 mb-3">
                                <div className="w-full bg-slate-800 rounded-full h-2.5 border border-slate-700 overflow-hidden">
                                    <div className={`h-2.5 rounded-full transition-all duration-500 ${isLocked ? 'bg-green-500' : 'bg-gradient-to-r from-blue-500 to-green-400'}`} style={{ width: `${progressPercent}%` }}></div>
                                </div>
                                <span className="text-xs font-bold text-slate-400 whitespace-nowrap w-10 text-right">{progressPercent}%</span>
                                <span className={`text-xs font-bold whitespace-nowrap ml-2 ${syncStatus.includes('Error') || syncStatus.includes('Failed') || syncStatus.includes('Offline') ? 'text-red-400' : 'text-blue-400'}`}>{syncStatus}</span>
                            </div>

                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-4">
                                <div>
                                    {isEditingOfficialResults ? (
                                        <h1 className="text-xl sm:text-2xl font-bold text-purple-400 flex items-center gap-2">👑 ADMIN MODE</h1>
                                    ) : (
                                        <div className="flex flex-col">
                                            <span className="text-xs text-slate-400 uppercase tracking-wider font-bold">{currentLeague?.name}</span>
                                            <h1 className="text-xl sm:text-2xl font-bold text-white flex items-center gap-2">
                                                {isLocked && <span title="Locked">🔒</span>} {isEditingOfficialResults ? '🔧 Official Results' : (currentUser?.name || 'Player')}
                                                <span className="text-sm bg-yellow-500/20 text-yellow-400 border border-yellow-500/30 px-2 py-0.5 rounded-md">{calculateScore(gameState).total} pts</span>
                                            </h1>
                                        </div>
                                    )}
                                </div>
                                <div className="flex gap-2 w-full sm:w-auto overflow-x-auto pb-1 sm:pb-0 hide-scrollbar">
                                    {(isLocked || isEditingOfficialResults) && (
                                        <>
                                            <button onClick={exportPredictions} className="flex-shrink-0 px-3 py-2 bg-slate-800 border border-slate-600 rounded-lg hover:bg-slate-700 font-bold text-sm flex items-center gap-2 transition">📥 Export .json</button>
                                            {view === 'bracket' && <button onClick={exportImage} className="flex-shrink-0 px-3 py-2 bg-slate-800 border border-slate-600 rounded-lg hover:bg-slate-700 font-bold text-sm flex items-center gap-2 transition text-pink-400">📸 Image</button>}
                                        </>
                                    )}
                                    <button onClick={() => setView(isEditingOfficialResults ? 'leagues' : 'users')} className="flex-shrink-0 px-3 py-2 bg-red-900/30 text-red-400 border border-red-900/50 rounded-lg hover:bg-red-900/50 font-bold text-sm transition">
                                        {isEditingOfficialResults ? 'Exit Admin' : 'Switch User'}
                                    </button>
                                </div>
                            </div>

                            {/* MAIN TABS */}
                            <div className="flex gap-2 overflow-x-auto hide-scrollbar">
                                <button onClick={() => setView('groups')} className={`flex-1 sm:flex-none px-4 py-2.5 rounded-lg font-bold text-sm sm:text-base whitespace-nowrap transition ${view === 'groups' ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-800 text-slate-400 hover:bg-slate-700 border border-slate-700'}`}>1. Groups</button>
                                {showKnockoutTab && (
                                    <button onClick={() => {
                                        if (!isEditingOfficialResults && isOfficialBracketPublished) {
                                            generateBracket();
                                        } else if (isEditingOfficialResults && adminData.bracket.r32?.length > 0) {
                                            setView('bracket');
                                        } else {
                                            alert('Generate bracket first!');
                                        }
                                    }} className={`flex-1 sm:flex-none px-4 py-2.5 rounded-lg font-bold text-sm sm:text-base whitespace-nowrap transition ${view === 'bracket' ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-800 text-slate-400 hover:bg-slate-700 border border-slate-700'}`}>2. Knockouts</button>
                                )}
                                {canAutoFillCurrentStage && (
                                    <button onClick={() => executeAutoFill(view === 'bracket' ? 'bracket' : 'groups')} className="flex-none px-4 py-2.5 bg-indigo-900/40 text-indigo-300 border border-indigo-700/50 hover:bg-indigo-800/50 rounded-lg font-bold text-sm sm:text-base transition flex items-center gap-2">🎲 Auto-Fill</button>
                                )}
                            </div>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto px-4 sm:px-8">
                        
                        {/* LOCK BRACKET BUTTON */}
                        {!isEditingOfficialResults && !isLocked && allGroupsComplete() && gameState.bracket.final?.length > 0 && gameState.bracket.final[0].winner && (
                            <div className="mb-8 text-center">
                                <button onClick={lockBracket} className="w-full sm:w-auto px-10 py-5 bg-gradient-to-r from-green-600 to-emerald-500 text-white text-xl font-black rounded-2xl hover:from-green-500 hover:to-emerald-400 shadow-[0_0_30px_rgba(16,185,129,0.4)] border border-green-400 transition transform hover:-translate-y-1 animate-pulse">
                                    🔒 LOCK & SUBMIT FINAL BRACKET
                                </button>
                            </div>
                        )}

                        {/* SCORE BREAKDOWN BANNER */}
                        {!isEditingOfficialResults && currentUser && (
                            <div className="hidden sm:flex mb-8 p-4 bg-slate-800/50 rounded-xl border border-slate-700 justify-around text-sm text-slate-300 shadow-inner">
                                <div className="text-center"><div className="font-bold text-slate-400 uppercase tracking-wider text-xs mb-1">Groups</div><div className="text-green-400 font-bold text-lg">{calculateScore(currentUser.gameState).breakdown.groups}</div></div>
                                <div className="text-center"><div className="font-bold text-slate-400 uppercase tracking-wider text-xs mb-1">3rd Place</div><div className="text-green-400 font-bold text-lg">{calculateScore(currentUser.gameState).breakdown.thirds}</div></div>
                                <div className="text-center"><div className="font-bold text-slate-400 uppercase tracking-wider text-xs mb-1">Knockouts</div><div className="text-green-400 font-bold text-lg">{calculateScore(currentUser.gameState).total - calculateScore(currentUser.gameState).breakdown.groups - calculateScore(currentUser.gameState).breakdown.thirds}</div></div>
                                <div className="text-center border-l border-slate-600 pl-8"><div className="font-bold text-yellow-500 uppercase tracking-wider text-xs mb-1">Total Score</div><div className="text-yellow-400 font-black text-2xl">{calculateScore(currentUser.gameState).total}</div></div>
                            </div>
                        )}

                        {view === 'groups' && (
                            <div className="pb-10">
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    {Object.keys(groupsData).map(group => (
                                        <div key={group} className={`bg-slate-800 p-4 sm:p-5 rounded-xl border shadow-lg flex flex-col sm:flex-row gap-6 ${isLocked ? 'border-slate-600 opacity-90' : 'border-slate-700'}`}>
                                            
                                            {/* Matches Column */}
                                            <div className="flex-1">
                                                <h2 className="text-lg font-black text-white mb-4 bg-slate-900 py-2 px-3 rounded-lg border border-slate-700">Group {group} Matches</h2>
                                                {groupMatches[group].map(match => renderMatchInput(match, 'groups'))}
                                            </div>

                                            {/* Live Table Column */}
                                            <div className="flex-1">
                                                <h2 className="text-lg font-black text-blue-400 mb-4 bg-blue-900/20 py-2 px-3 rounded-lg border border-blue-900/50">Live Table</h2>
                                                <div className="bg-slate-900 rounded-lg border border-slate-700 overflow-hidden">
                                                    <table className="w-full text-sm text-left">
                                                        <thead className="bg-slate-800 text-slate-400">
                                                            <tr><th className="p-2">Team</th><th className="p-2 text-center">P</th><th className="p-2 text-center">GD</th><th className="p-2 text-center">Pts</th></tr>
                                                        </thead>
                                                        <tbody>
                                                            {currentStandings[group].map((t, i) => (
                                                                <tr key={t.name} className={`border-t border-slate-800 ${i < 2 ? 'bg-green-900/20' : i === 2 ? 'bg-yellow-900/20' : 'opacity-50'}`}>
                                                                    <td className="p-2 font-bold">{i+1}. {getFlag(t.name)}</td>
                                                                    <td className="p-2 text-center">{t.played}</td>
                                                                    <td className="p-2 text-center">{t.gd > 0 ? `+${t.gd}` : t.gd}</td>
                                                                    <td className="p-2 text-center font-bold text-white">{t.pts}</td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                {!isLocked && (
                                    <div className="mt-10 text-center sticky bottom-4 z-30">
                                        {isEditingOfficialResults ? (
                                            allGroupsComplete() && (
                                                <button onClick={() => { generateBracket(); window.scrollTo(0,0); }} className="w-full sm:w-auto px-8 py-4 bg-blue-600 text-white text-lg font-bold rounded-xl hover:bg-blue-500 shadow-2xl border border-blue-400 transition transform hover:-translate-y-1">Generate Knockout Bracket ➡️</button>
                                            )
                                        ) : isOfficialBracketPublished ? (
                                            <button onClick={() => { generateBracket(); window.scrollTo(0,0); }} className="w-full sm:w-auto px-8 py-4 bg-blue-600 text-white text-lg font-bold rounded-xl hover:bg-blue-500 shadow-2xl border border-blue-400 transition transform hover:-translate-y-1">🏆 Go to Knockout Stage ➡️</button>
                                        ) : (
                                            <div className="w-full sm:w-auto px-8 py-4 bg-slate-800/90 text-slate-300 text-lg font-bold rounded-xl border border-slate-700 shadow-2xl">
                                                ⏳ Waiting for Admin to publish the knockout stage...
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'bracket' && (
                            <div ref={bracketRef} className={`p-4 sm:p-6 bg-slate-900 rounded-2xl border shadow-2xl ${isLocked ? 'border-slate-600' : 'border-slate-700'}`}>
                                <div className="bracket-container flex gap-4 sm:gap-8 overflow-x-auto pb-8 pt-2 px-2">
                                    {['r32', 'r16', 'qf', 'sf', 'finals'].map((roundCol) => (
                                        <div key={roundCol} className="bracket-col min-w-[260px] sm:min-w-[300px] flex-shrink-0 flex flex-col">
                                            <h3 className="text-lg sm:text-xl font-black mb-6 text-center uppercase tracking-widest text-slate-400 bg-slate-800 py-2 rounded-lg border border-slate-700 sticky top-0 z-10">
                                                {roundCol === 'r32' ? 'Round of 32' : roundCol === 'r16' ? 'Round of 16' : roundCol === 'qf' ? 'Quarterfinals' : roundCol === 'sf' ? 'Semifinals' : 'Medal Matches'}
                                            </h3>
                                            <div className="space-y-3 sm:space-y-5 flex-1 flex flex-col justify-around">
                                                {roundCol !== 'finals' ? (
                                                    gameState.bracket[roundCol]?.map((match) => renderMatchInput(match, roundCol))
                                                ) : (
                                                    <>
                                                        {/* Final Match */}
                                                        {gameState.bracket.final?.map((match) => (
                                                            <div key={match.id} className="mb-6">
                                                                <div className="text-center text-xs text-yellow-400 font-bold mb-2 uppercase tracking-wider">🥇 World Cup Final</div>
                                                                {renderMatchInput(match, 'final')}
                                                            </div>
                                                        ))}
                                                        
                                                        {/* Third Place Match */}
                                                        {gameState.bracket.thirdPlace?.map((match) => (
                                                            <div key={match.id}>
                                                                <div className="text-center text-xs text-orange-400 font-bold mb-2 uppercase tracking-wider">🥉 3rd Place Playoff</div>
                                                                {renderMatchInput(match, 'thirdPlace')}
                                                            </div>
                                                        ))}
                                                    </>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
